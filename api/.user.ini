; ─── AVIATOR Barbershop — Config PHP pour Hostinger ──────────────────────────
; Ce fichier est lu automatiquement par PHP-FPM sur Hostinger (hébergement mutualisé).
; À uploader dans : public_html/api/.user.ini
; ⚠️ Après upload, attendre ~5 minutes que le cache PHP-FPM se vide.

; ─── Limites d'upload ─────────────────────────────────────────────────────────
upload_max_filesize = 10M
post_max_size       = 12M

; ─── Mémoire & Temps ──────────────────────────────────────────────────────────
memory_limit        = 128M
max_execution_time  = 60
max_input_time      = 60

; ─── Types MIME WebP (si PHP < 8.1) ──────────────────────────────────────────
; Certaines versions de libmagic ne reconnaissent pas nativement image/webp.
; Le code upload.php gère ce cas via la signature binaire RIFF/WEBP.
